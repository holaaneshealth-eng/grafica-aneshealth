services:
  aneshealth:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATA_DIR: /data
      # OBLIGATORIO en produccion: secreto largo y aleatorio (p.ej. `openssl rand -hex 48`)
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET en un archivo .env}
      # Opcional: contrasenas de seed (si no, se generan y se escriben en /data/INITIAL_CREDENTIALS.txt)
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CLINICAL_PASSWORD_PREFIX: ${CLINICAL_PASSWORD_PREFIX:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-15}
    volumes:
      - aneshealth-data:/data
    restart: unless-stopped

volumes:
  aneshealth-data:
