# Ejecucion local completa (app + Postgres) con Docker.
# En produccion (Render) se usa Neon en lugar de este contenedor de postgres.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aneshealth
    volumes:
      - aneshealth-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  aneshealth:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aneshealth
      # OBLIGATORIO: secreto largo y aleatorio (p.ej. `openssl rand -hex 48`)
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET en un archivo .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CLINICAL_PASSWORD_PREFIX: ${CLINICAL_PASSWORD_PREFIX:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-15}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  aneshealth-pg:
