# Blueprint de despliegue GRATUITO en Render.com (https://render.com)
# Base de datos: Neon (Postgres gratis y persistente) -> se configura DATABASE_URL.
# Pasos:
#   1) Crea una base de datos gratis en https://neon.tech y copia su "connection string".
#   2) Sube este repo a GitHub.
#   3) En Render: New -> Blueprint -> selecciona el repo.
#   4) Cuando pida DATABASE_URL, pega la cadena de conexion de Neon (con ?sslmode=require).
services:
  - type: web
    name: aneshealth
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Cadena de conexion de Neon (Postgres). NO la publiques en el repo.
      - key: DATABASE_URL
        sync: false
      # Render genera un secreto seguro automaticamente.
      - key: JWT_SECRET
        generateValue: true
      # Opcional: contrasenas de seed. Si se dejan vacias, se generan y aparecen en los Logs.
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLINICAL_PASSWORD_PREFIX
        sync: false
      - key: RETENTION_DAYS
        value: "15"
