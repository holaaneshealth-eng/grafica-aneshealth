# Blueprint de despliegue para Render.com (https://render.com)
# Sube el repo a GitHub, entra en Render > New > Blueprint y selecciona este repo.
services:
  - type: web
    name: aneshealth
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      # Render genera un secreto seguro automaticamente.
      - key: JWT_SECRET
        generateValue: true
      # Define estas en el panel de Render (opcional). Si se dejan vacias, se generan
      # contrasenas aleatorias y quedan en /data/INITIAL_CREDENTIALS.txt.
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLINICAL_PASSWORD_PREFIX
        sync: false
      - key: RETENTION_DAYS
        value: "15"
    disk:
      name: aneshealth-data
      mountPath: /data
      sizeGB: 1
